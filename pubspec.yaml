name: auramed
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # UI & Utilities
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  intl: ^0.18.1
  lottie: ^3.1.2
  video_player: ^2.9.2
  google_fonts: ^6.2.1

  # FIREBASE PACKAGES
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  google_sign_in: ^6.2.2
  firebase_messaging: ^15.1.3

  # ✅ Health Connect — reads data from Samsung Health / Galaxy Fit 3
  health: ^11.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/videos/